---
apiVersion: ceph.rook.io/v1
kind: CephBlockPool
metadata:
  name: $name
  namespace: rook-ceph
spec:
  replicated:
    size: 1
    requireSafeReplicaSize: false
  mirroring:
    enabled: true
    mode: image
    # Remove snapshot scheduling to avoid RBD support module issues
    # snapshotSchedules can be added later once the module stabilizes