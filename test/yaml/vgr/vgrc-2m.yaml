# VolumeGroupReplicationClass vgrc-2m - matches rbd-volumereplicationclass (2m interval)
apiVersion: replication.storage.openshift.io/v1alpha1
kind: VolumeGroupReplicationClass
metadata:
  name: vgrc-2m
spec:
  provisioner: rook-ceph.rbd.csi.ceph.com
  parameters:
    clusterID: rook-ceph
    pool: replicapool
    mirroringMode: snapshot
    schedulingInterval: "2m"
    replication.storage.openshift.io/group-replication-secret-name: rook-csi-rbd-provisioner
    replication.storage.openshift.io/group-replication-secret-namespace: rook-ceph
